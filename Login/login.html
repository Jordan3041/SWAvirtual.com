<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWA Virtual - CrewHub Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img src="svalogo.png" alt="SWA Virtual Logo" class="login-logo">
            <h2>CrewHub Login</h2>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="pilot-id">Pilot ID</label>
                <input type="text" id="pilot-id" placeholder="SWA13682" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">Show</button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Lost Password?</a>
            </div>

            <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <div class="login-footer">
            <p>Don't have an account yet? <a href="#" class="signup-link">Sign Up!</a></p>
        </div>
    </div>

    <div class="legal-links">
        <a href="#">cookies</a>
        <a href="#">legal</a>
    </div>

    <script>
        // Simple script to toggle password text visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Show';
            }
        }
    </script>
</body>
</html>
